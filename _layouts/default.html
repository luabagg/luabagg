<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    {% seo %}
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" type="image/png" sizes="32x32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Saira+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f2cc8f">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <a id="skip-to-content" href="#content">Skip to content</a>

    <header class="site-header" role="banner">
      <div class="site-header-inner">
        <a class="site-mark" href="{{ '/' | relative_url }}">Luan Baggio</a>
        <button class="nav-toggle" type="button" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="primary-nav">
          <span class="nav-toggle-bars" aria-hidden="true">
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
          </span>
          <span class="nav-toggle-close" aria-hidden="true">&times;</span>
        </button>
        <nav class="site-nav" id="primary-nav" aria-label="Primary navigation">
          <a href="{{ '/' | relative_url }}#languages">Stack</a>
          <a href="{{ '/' | relative_url }}#experience">Experience</a>
          <a href="{{ '/' | relative_url }}#ventures">Projects</a>
          <a href="{{ '/' | relative_url }}#education">Education</a>
          <a href="{{ '/' | relative_url }}#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main id="content" class="main-content" role="main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <span>Software engineer in Brazil.</span>
      <span>Built with Jekyll.</span>
    </footer>

    <script src="{{ '/assets/js/interactions.js?v=' | append: site.github.build_revision | relative_url }}" defer></script>
  </body>
</html>
