name: Metrics

on:
  # Daily refresh at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Run on pushes to main so config changes trigger fresh renders.
  push:
    branches:
      - main
  # Manual trigger from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Lightweight profile card. Keep this small so it works as a plain
      # README image and does not depend on portfolio-only layout fixes.
      - name: Profile
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.profile.svg
          template: classic
          config_display: columns
          base: header

      # Half-year commit graph.
      - name: Half-year commit graph
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.isocalendar.svg
          template: classic
          config_display: columns
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      # Most-used languages — compact, with byte/percentage details.
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.languages.svg
          template: classic
          config_display: columns
          base: ""
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_ignored: html, css, less, scss, dockerfile, makefile, cmake, shell, gnuplot
          plugin_languages_limit: 6

      # Featured repositories in one generated image, so the plugin title is
      # rendered once instead of repeated across separate cards.
      - name: Featured repositories
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.repositories.svg
          template: classic
          config_display: columns
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: luabagg/orcgen, gearpoint/filepoint, luabagg/obsidian-statistics-vault
