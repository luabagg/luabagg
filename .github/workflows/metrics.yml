name: Metrics

on:
  # Daily refresh at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Run on pushes to main (so config changes trigger a re-render)
  push:
    branches:
      - main
  # Manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Most-used languages — compact, with byte/percentage details.
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.languages.svg
          base: ""
          template: classic
          config_display: columns
          plugin_languages: yes
          plugin_languages_ignored: html, css, less, scss, dockerfile, makefile, cmake, shell, gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6

      # Pinned / featured repositories — matches the repos currently pinned on
      # github.com/luabagg (kept in sync with profile pinned items).
      - name: Pinned repositories
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.repositories.svg
          base: ""
          template: classic
          config_display: columns
          plugin_repositories: yes
          plugin_repositories_featured: luabagg/orcgen, gearpoint/filepoint, luabagg/obsidian-statistics-vault, luabagg/agent-skills