name: Metrics

on:
  # Daily refresh at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Run on pushes to main so config changes trigger fresh renders.
  push:
    branches:
      - main
  # Manual trigger from the Actions tab.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Profile summary card, inspired by lowlighter's general.svg layout:
      # main info, contribution calendar, most-used languages, notable
      # contributions, and starred topics.
      - name: Profile summary
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.general.svg
          template: classic
          config_display: columns
          base: header
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_ignored: html, css, less, scss, dockerfile, makefile, cmake, shell, gnuplot
          plugin_languages_limit: 6
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 12
